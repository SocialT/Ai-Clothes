services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      - WATCHFILES_FORCE_POLLING=true
      - PYTHONUNBUFFERED=1
    command: ["/app/docker-entrypoint.sh", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "3000", "--reload"]

